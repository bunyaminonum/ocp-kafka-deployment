# Custom SCC — restricted UID/GID range for Confluent components.
# CFK pods require a fixed UID 1001; OpenShift's 'restricted-v2' policy does not allow that.
# This SCC opens the 1000-1005 range and is bound ONLY to Kafka's ServiceAccounts
# (see README — 'oc adm policy add-scc-to-user'). This gives us a narrow, audited
# permission instead of a broad relaxation like 'podSecurity.enabled=false'.
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: confluent-scc
  annotations:
    kubernetes.io/description: "Restricted UID/GID range SCC for Confluent Kafka (KRaft) components"
priority: 10
runAsUser:
  type: MustRunAsRange
  uidRangeMin: 1000
  uidRangeMax: 1005
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1005
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
requiredDropCapabilities:
  - MKNOD
# Only the volume types Kafka actually needs (no hostPath or other risky types).
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
