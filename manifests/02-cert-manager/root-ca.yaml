# Self-signed root CA — generated by cert-manager and written to the 'ca-pair-sslcerts' secret.
# CFK (via autoGeneratedCerts: true on the Kafka/KRaftController CRs) generates and signs a
# LEAF certificate for each pod using this CA; cert-manager only produces the root CA and
# auto-renews it via 'renewBefore'.
# The secret name matches the Confluent documentation exactly (tls.crt + tls.key) — do not change it.
#
# ENTERPRISE PRODUCTION DIFFERENCE: self-signed is NOT used in production — 'issuerRef'
# should point to a ClusterIssuer chained to the organization's internal PKI (Vault PKI /
# AD CS / intermediate CA), so certificates are part of the corporate trust chain. The
# secret name still stays 'ca-pair-sslcerts'.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-bootstrap
  namespace: confluent
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: confluent-root-ca
  namespace: confluent
spec:
  isCA: true
  commonName: "Confluent Root CA"
  secretName: ca-pair-sslcerts
  duration: 8760h      # 1 year
  renewBefore: 720h    # auto-renew 30 days before expiry
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-bootstrap
    kind: Issuer
    group: cert-manager.io
