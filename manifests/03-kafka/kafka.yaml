# Kafka — secured (TLS + SASL/PLAIN), 3-broker cluster (bound to KRaft mode).
# internal listener: the TLS+SASL protected port that applications (producer/consumer) connect to.
# controllerListener: must match the KRaftController CR's 'listeners.controller' EXACTLY
#      (same secretRef + tls) — otherwise Kafka cannot connect to the controller.
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  # 3 brokers = classic HA minimum; replication-factor-3 topics stay up even if one broker goes down.
  replicas: 3
  # ACL authorization (native CFK support, no SASL/SCRAM needed — ACLs work with any SASL
  # mechanism, PLAIN included). With this enabled, every principal except superUsers is
  # denied by default unless an explicit ACL grants it (see README - Authorization/ACLs).
  # 'kafka' is the interbroker principal (kafka-credential) — it MUST be a superuser or
  # brokers can't talk to each other.
  authorization:
    type: simple
    superUsers:
      - User:kafka
  # Enables the JMX Prometheus exporter (:7778) + authenticated remote JMX (:7203).
  # Secrets come from scripts/create-jmx-secrets.sh; full monitoring stack in observability/.
  metrics:
    jmx:
      authentication:
        secretRef: kafka-jmx-password
      accessControl:
        enabled: true
        secretRef: kafka-jmx-access
  dataVolumeCapacity: 20Gi
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0
  tls:
    autoGeneratedCerts: true
  listeners:
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kafka-credential
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: plain
          jaasConfig:
            secretRef: kraft-credential
  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: "1536Mi"
      limits:
        cpu: "1"
        memory: "3Gi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kafka
              topologyKey: kubernetes.io/hostname
