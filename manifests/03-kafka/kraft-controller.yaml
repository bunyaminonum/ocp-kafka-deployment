# KRaftController — secured (TLS + SASL/PLAIN), 3-replica Raft metadata layer.
# TLS: CFK generates a leaf certificate for each pod, signed by the CA cert-manager
#      produced ('ca-pair-sslcerts') via autoGeneratedCerts. SASL/PLAIN: controller listener
#      authentication comes from the 'kraft-credential' secret. No podSecurityContext —
#      the Custom SCC (confluent-scc) already allows CFK's UID 1001.
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  # KRaft rule: controller count must be ODD and >=3 (Raft majority quorum).
  replicas: 3
  # ACL-management requests (CREATE_ACLS/DELETE_ACLS) are forwarded from brokers to the
  # active KRaft controller, which authorizes them against ITS OWN superUsers list — not the
  # Kafka CR's. 'kafka' must be listed here too, or 'kafka-acls --add' fails with
  # "CREATE_ACLS needs ALTER permission" even though 'kafka' is already a Kafka-side
  # superuser (confirmed by testing; Confluent's own example leaves this empty, which does
  # NOT work in practice for a Kafka superuser that also needs to manage ACLs).
  authorization:
    type: simple
    superUsers:
      - User:kafka
  # Enables the JMX Prometheus exporter (:7778) + authenticated remote JMX (:7203).
  # Secrets come from scripts/create-jmx-secrets.sh; full monitoring stack in observability/.
  metrics:
    jmx:
      authentication:
        secretRef: kafka-jmx-password
      accessControl:
        enabled: true
        secretRef: kafka-jmx-access
  dataVolumeCapacity: 10Gi
  configOverrides:
    server:
    - "allow.everyone.if.no.acl.found=false"
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0
  tls:
    autoGeneratedCerts: true
  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kraft-credential
  podTemplate:
    resources:
      requests:
        cpu: "300m"
        memory: "768Mi"
      limits:
        cpu: "750m"
        memory: "1536Mi"
    # 'preferred' (soft) because this is a single-node environment. On a real multi-node
    # cluster this SAME YAML spreads the 3 pods across 3 different nodes; for hard isolation
    # use 'required' + oneReplicaPerNode (see README — Enterprise production differences).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kraftcontroller
              topologyKey: kubernetes.io/hostname
