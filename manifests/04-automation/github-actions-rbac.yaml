# Least-privilege identity for the GitHub Actions self-hosted runner (push-based automation,
# see README - Automation option A). Same least-privilege pattern as gitops-rbac.yaml (used
# for ArgoCD) — same idea, just a different identity. Scoped ONLY to kafkas/kraftcontrollers
# in the confluent namespace; read-only on pods/statefulsets for the workflow's verify step.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: confluent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-deployer
  namespace: confluent
rules:
  - apiGroups: ["platform.confluent.io"]
    resources: ["kafkas", "kraftcontrollers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: confluent
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: confluent
roleRef:
  kind: Role
  name: github-actions-deployer
  apiGroup: rbac.authorization.k8s.io
