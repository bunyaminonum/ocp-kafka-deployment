# Grants ArgoCD's application-controller ServiceAccount permission to manage
# ONLY Kafka/KRaftController resources, ONLY in the confluent namespace.
# Same least-privilege pattern as github-actions-rbac.yaml (used for GitHub Actions)
# — same idea, just a different identity (ArgoCD's SA).
# This file is DELIBERATELY NOT synced by the Application itself — a controller
# granting itself its own permissions would be a privilege-escalation anti-pattern;
# this belongs to the platform/bootstrap layer (applied manually via oc apply).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-confluent-deployer
  namespace: confluent
rules:
  - apiGroups: ["platform.confluent.io"]
    resources: ["kafkas", "kraftcontrollers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-confluent-deployer
  namespace: confluent
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
roleRef:
  kind: Role
  name: argocd-confluent-deployer
  apiGroup: rbac.authorization.k8s.io
