# Grafana's Helm chart creates no Route (it isn't OpenShift-aware and has no operator
# behind it, unlike the console/ArgoCD routes CFK/OpenShift GitOps create automatically) -
# so one is defined explicitly here. 'edge' termination: Grafana serves plain HTTP itself,
# TLS is terminated at the router. Equivalent to:
#   oc create route edge grafana --service=grafana -n confluent
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: confluent
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: service
  tls:
    termination: edge
