# Helm values for grafana/grafana, trimmed for this practice cluster.
# Install: helm upgrade --install grafana grafana/grafana -n confluent -f observability/grafana-values.yaml

# A small PVC for Grafana's own SQLite DB (dashboards, datasources, users). Started as
# `enabled: false` (emptyDir) - switched to a PVC after this node's chronic CPU pressure
# (~99% allocated) caused the Grafana pod to be *preempted* twice to make room for other
# pods (once for a Prometheus resource bump). With emptyDir, every preemption meant
# re-running setup-grafana-dashboards.sh from scratch. A 200Mi PVC survives pod
# rescheduling since it isn't tied to the pod's lifecycle like emptyDir is - the dashboards
# and datasource now persist across the preemptions this environment keeps causing.
persistence:
  enabled: true
  size: 200Mi
  storageClassName: crc-csi-hostpath-provisioner

# The default chart runs an init container (plain busybox, as root) that chowns the data
# directory before the main container starts. Since we're letting OpenShift assign its own
# arbitrary UID below (rather than forcing UID 472 like the chart wants), this root init
# container would ALSO get rejected by the SCC - a second Forbidden error on top of the
# first. Disabling it avoids that; Grafana's own image handles arbitrary UIDs fine without
# it once the fixed UID is removed.
initChownData:
  enabled: false

# Not used here - dashboards/datasources were loaded once via the Grafana HTTP API instead
# (see grafana-route.yaml + README). Disabled explicitly so a future values change doesn't
# silently enable a ConfigMap-watching sidecar we don't need.
sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: false

resources:
  requests:
    cpu: 30m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Same class of problem as Prometheus's server.securityContext (see prometheus-values.yaml)
# - the chart's default fixed UID/GID (472) is rejected by OpenShift's SCCs. Each subfield
# must be nulled individually; setting the whole map to `{}` is a no-op against the chart's
# own defaults (Helm merges, doesn't replace).
securityContext:
  runAsUser: null
  runAsGroup: null
  runAsNonRoot: null
  fsGroup: null
