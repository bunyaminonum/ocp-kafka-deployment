# Red Hat's official "OpenShift GitOps" (ArgoCD) operator.
# Only the AllNamespaces install mode is supported (verified against the cluster) — so we do
# NOT create a separate namespace/OperatorGroup here; we use the existing 'openshift-operators'
# namespace and its 'global-operators' OperatorGroup. Once installed, it automatically creates
# the 'openshift-gitops' namespace and a ready-to-use ArgoCD instance.
# Catalog/channel/version verified against the cluster: redhat-operators, latest, v1.21.1
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
