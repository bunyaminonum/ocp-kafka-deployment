# ArgoCD Application — watches ONLY the Kafka manifest folder (prod-deployment/kafka).
# Namespace/SCC/cert-manager/operator (the bootstrap layer) are DELIBERATELY out of scope:
# those are installed once, manually / by the platform team, and aren't touched on every
# Kafka change.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: git@github.com:bunyaminonum/ocp-kafka-deployment.git
    targetRevision: main
    path: prod-deployment/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: confluent
  syncPolicy:
    automated:
      prune: true      # a resource removed from git is also removed from the cluster
      selfHeal: true    # manual changes are automatically reverted back to the git state
