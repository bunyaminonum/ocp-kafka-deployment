# ArgoCD Application — YALNIZCA Kafka manifest klasörünü (prod-deployment/kafka) izler.
# Namespace/SCC/cert-manager/operatör (bootstrap katmanı) BİLEREK kapsam dışı: onlar bir
# kere elle/platform ekibince kurulur, her Kafka değişikliğinde tekrar dokunulmaz.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: git@github.com:bunyaminonum/ocp-kafka-deployment.git
    targetRevision: main
    path: prod-deployment/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: confluent
  syncPolicy:
    automated:
      prune: true      # git'ten silinen kaynak cluster'dan da silinir
      selfHeal: true   # elle yapılan değişiklikler git'teki hale otomatik geri döndürülür
