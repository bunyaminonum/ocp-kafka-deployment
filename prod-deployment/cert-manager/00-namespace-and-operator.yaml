# Red Hat's official "cert-manager Operator for Red Hat OpenShift".
# Deliberately chosen INSTEAD OF the community Helm chart: OpenShift-native, Red Hat
# supported, auto-updatable via OLM. Catalog/channel/version verified against the cluster:
#   catalogSource: redhat-operators, channel: stable-v1, CSV: cert-manager-operator.v1.20.0
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-operator
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: cert-manager-operator
  namespace: cert-manager-operator
spec:
  targetNamespaces:
    - cert-manager-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
spec:
  channel: stable-v1
  name: openshift-cert-manager-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
