# Self-signed root CA — cert-manager ile üretilip 'ca-pair-sslcerts' secret'ına yazılır.
# CFK (Kafka/KRaftController CR'larında autoGeneratedCerts: true ile) her pod için LEAF
# sertifikaları bu CA ile üretir/imzalar; cert-manager yalnızca root CA'yı üretir ve
# 'renewBefore' ile otomatik yeniler.
# Secret adı Confluent dokümanıyla birebir aynı (tls.crt + tls.key), değiştirme.
#
# KURUMSAL PROD FARKI: self-signed KULLANILMAZ — 'issuerRef', kurumun internal PKI'sine
# bağlı bir ClusterIssuer'a işaret etmeli (Vault PKI / AD CS / ara CA), böylece
# sertifikalar kurumsal güven zincirine dahil olur. Secret adı yine 'ca-pair-sslcerts' kalır.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-bootstrap
  namespace: confluent
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: confluent-root-ca
  namespace: confluent
spec:
  isCA: true
  commonName: "Confluent Root CA"
  secretName: ca-pair-sslcerts
  duration: 8760h      # 1 yil
  renewBefore: 720h    # suresi dolmadan 30 gun once otomatik yenile
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-bootstrap
    kind: Issuer
    group: cert-manager.io
