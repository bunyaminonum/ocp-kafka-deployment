# Self-signed root CA — cert-manager ile üretilip 'ca-pair-sslcerts' secret'ına yazılıyor.
# CFK, bu secret'ı (Kafka/KRaftController CR'larında autoGeneratedCerts: true ile) okuyup
# her pod için LEAF sertifikaları KENDİSİ üretip bu CA ile imzalıyor — cert-manager burada
# sadece root CA'nın üretimi/rotasyonu için kullanılıyor, leaf sertifikalara karışmıyor.
# Secret adı/format Confluent'ın resmi dokümanıyla birebir aynı (tls.crt + tls.key):
# https://docs.confluent.io/operator/current/co-manage-certificates.html
#
# DÜRÜSTLÜK NOTU: Bu CA "self-signed" — yani kimse tarafından harici olarak güvenilmiyor,
# sadece bizim cluster'ımız içinde tutarlı/geçerli. Gerçek kurumsal ortamda bu adım,
# kurumun kendi internal PKI'sinden (Adım 0'da sorduğumuz "internal CA var mı?") zincirlenen
# bir Issuer ile değiştirilmeli (örn. cert-manager'ın Vault/CA-injector veya ACME entegrasyonu).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-bootstrap
  namespace: confluent-prod
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: confluent-prod-root-ca
  namespace: confluent-prod
spec:
  isCA: true
  commonName: "Confluent Prod Root CA"
  secretName: ca-pair-sslcerts
  duration: 8760h      # 1 yil
  renewBefore: 720h    # suresi dolmadan 30 gun once otomatik yenile
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-bootstrap
    kind: Issuer
    group: cert-manager.io
