# Custom SCC — Confluent bileşenleri için sınırlı UID/GID aralığı.
# CFK pod'ları sabit UID 1001 ister; OpenShift 'restricted-v2' buna izin vermez.
# Bu SCC 1000-1005 aralığını açar ve YALNIZCA Kafka'nın ServiceAccount'larına bağlanır
# (bkz. README — 'oc adm policy add-scc-to-user'). Böylece 'podSecurity.enabled=false'
# gibi geniş bir gevşetmeye gerek kalmadan, dar ve denetimli bir izin veririz.
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: confluent-scc
  annotations:
    kubernetes.io/description: "Confluent Kafka (KRaft) bileşenleri için sınırlı UID/GID aralıklı SCC"
priority: 10
runAsUser:
  type: MustRunAsRange
  uidRangeMin: 1000
  uidRangeMax: 1005
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1001
      max: 1005
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
requiredDropCapabilities:
  - MKNOD
# Sadece Kafka'nın ihtiyaç duyduğu volume tipleri (hostPath gibi tehlikeli olanlar yok).
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
