# Prod-shaped Kafka — playground'daki manifests/kafka.yaml'dan farkları:
# TLS, SASL/PLAIN (internal listener + controller listener), resource limits,
# preferred pod anti-affinity. podSecurityContext YOK — Custom SCC hallediyor.
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent-prod
  annotations:
    gitops-canli-test: "argocd-otomatik-uyguladi"
spec:
  replicas: 3
  dataVolumeCapacity: 20Gi
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0

  tls:
    autoGeneratedCerts: true

  listeners:
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kafka-credential

  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
      # Bu bölüm, KRaftController CR'ındaki 'listeners.controller' ile
      # BİREBİR eşleşmeli (aynı secretRef, aynı tls.enabled) — Confluent
      # dokümanının açıkça vurguladığı bir kural, tutmazsa controller'a bağlanamaz.
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: plain
          jaasConfig:
            secretRef: kraft-credential

  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: "1536Mi"
      limits:
        cpu: "1"
        memory: "3Gi"
    # Aynı gerekçe: tek node'da 'preferred', gerçek multi-node'da bu YAML
    # değişmeden 3 broker'ı 3 farklı node'a dağıtır.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kafka
              topologyKey: kubernetes.io/hostname
