# Kafka — güvenli (TLS + SASL/PLAIN), 3 broker'lı cluster (KRaft moduna bağlı).
# internal listener: uygulamaların (producer/consumer) bağlandığı, TLS+SASL korumalı port.
# controllerListener: KRaftController CR'ındaki 'listeners.controller' ile BİREBİR eşleşmeli
#      (aynı secretRef + tls) — eşleşmezse Kafka controller'a bağlanamaz.
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  # 3 broker = klasik HA minimumu; replication-factor 3 topic'ler bir broker düşse de ayakta.
  replicas: 3
  dataVolumeCapacity: 20Gi
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0
  tls:
    autoGeneratedCerts: true
  listeners:
    internal:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kafka-credential
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: plain
          jaasConfig:
            secretRef: kraft-credential
  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: "1536Mi"
      limits:
        cpu: "1"
        memory: "3Gi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kafka
              topologyKey: kubernetes.io/hostname
