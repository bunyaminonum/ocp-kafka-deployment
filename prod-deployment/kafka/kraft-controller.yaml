# KRaftController — güvenli (TLS + SASL/PLAIN), 3 replikalı Raft metadata katmanı.
# TLS: cert-manager'ın ürettiği 'ca-pair-sslcerts' CA'sıyla CFK her pod için leaf
#      sertifika üretir (autoGeneratedCerts). SASL/PLAIN: controller listener kimlik
#      doğrulaması 'kraft-credential' secret'ından. podSecurityContext yok — Custom SCC
#      (confluent-scc) CFK'nın UID 1001'ine zaten izin veriyor.
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  # KRaft kuralı: controller sayısı TEK ve >=3 olmalı (Raft çoğunluk oyu).
  replicas: 3
  dataVolumeCapacity: 10Gi
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0
  tls:
    autoGeneratedCerts: true
  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kraft-credential
  podTemplate:
    resources:
      requests:
        cpu: "300m"
        memory: "768Mi"
      limits:
        cpu: "750m"
        memory: "1536Mi"
    # Tek-node ortam için 'preferred' (yumuşak). Multi-node prod'da bu YAML değişmeden
    # 3 pod'u 3 farklı node'a dağıtır; sert izolasyon için 'required' + oneReplicaPerNode
    # kullanılır (bkz. README — Kurumsal prod farkları).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kraftcontroller
              topologyKey: kubernetes.io/hostname
