# Prod-shaped KRaftController — playground'daki manifests/kraft-controller.yaml'dan
# farkları: TLS (autoGeneratedCerts), SASL/PLAIN authentication, resource limits,
# preferred pod anti-affinity. podSecurityContext YOK artık — Custom SCC (confluent-prod)
# zaten CFK'nın varsayılan UID 1001'ine izin veriyor, ezmemize gerek kalmadı.
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent-prod
spec:
  replicas: 3
  dataVolumeCapacity: 10Gi
  image:
    application: confluentinc/cp-server:8.3.0
    init: confluentinc/confluent-init-container:3.3.0

  # TLS: cert-manager'ın ürettiği 'ca-pair-sslcerts' CA'sını kullanarak CFK
  # her pod için kendi leaf sertifikasını üretip imzalıyor.
  tls:
    autoGeneratedCerts: true

  listeners:
    controller:
      tls:
        enabled: true
      authentication:
        type: plain
        jaasConfig:
          secretRef: kraft-credential

  podTemplate:
    resources:
      requests:
        cpu: "300m"
        memory: "768Mi"
      limits:
        cpu: "750m"
        memory: "1536Mi"
    # PRATİK ORTAM NOTU: Tek node (CRC) olduğu için 'preferred' (yumuşak) kullanıyoruz.
    # 'required' (sert) kullansaydık, tek node'a 3 replica sığamayacağı için 2 pod
    # sonsuza kadar Pending kalırdı. Gerçek multi-node prod cluster'da bu AYNI YAML
    # otomatik olarak 3 pod'u 3 farklı node'a dağıtır (weight:100 ile güçlü tercih).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - kraftcontroller
              topologyKey: kubernetes.io/hostname
